---
# ServiceAccount for the monitoring agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rootless-monitor
  namespace: rootless-monitor
  labels:
    app: rootless-monitor

---
# ClusterRole - Read-only access to cluster resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rootless-monitor-reader
  labels:
    app: rootless-monitor
rules:
  # Read pods information
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]

  # Read nodes information
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get", "list", "watch"]

  # Read events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

  # Read namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

  # Read deployments, daemonsets, etc.
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]

  # Read services
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rootless-monitor-reader
  labels:
    app: rootless-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rootless-monitor-reader
subjects:
  - kind: ServiceAccount
    name: rootless-monitor
    namespace: rootless-monitor
